# HTTP
server {
    listen 80;
    server_name _;

    # openapi.json
    location /openapi.json {
        proxy_pass http://backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend
    location / {
        proxy_pass http://frontend:3000/;

        # host and user ip
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP  $remote_addr; 
    }

    # Backend
    location /api/ {
        proxy_pass http://backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP  $remote_addr; 
    }
}