# HTTP
server {
    listen 80;
    server_name _;

    # Redirect to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443;
    server_name _;

    # Frontend
    location / {
        proxy_pass http://frontend:80;

        # host and user ip
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP  $remote_addr; 
    }

    # Backend
    location /api/ {
        proxy_pass http://backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP  $remote_addr; 
    }
}